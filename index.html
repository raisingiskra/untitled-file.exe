<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(sys.log="redacted").exe</title>
<style>
  
  * { box-sizing: border-box; margin:0; padding:0; }
  html, body { height:100%; background:#0a0a0a; color:#00ff00; font-family: "Courier New", Courier, monospace; display:flex; flex-direction:column; }
  body::before {
    content:""; position:fixed; top:0; left:0; width:100%; height:100%;
    background:url('static-noise.gif') repeat; opacity:0.03; pointer-events:none;
  }

  header { height:40px; padding:10px; border-bottom:1px solid #006600; }
  .container { display:flex; flex:1; overflow:hidden; }
  nav { width:200px; border-right:1px solid #006600; padding:10px; }
  nav a { display:block; color:#00ff00; text-decoration:none; margin:5px 0; transition:0.2s; }
  nav a:hover { color:#66ff66; text-shadow:0 0 5px #00ff00; }
  main { flex:1; padding:10px; overflow-y:auto; }
  aside { width:200px; border-left:1px solid #006600; padding:10px; }
  footer { height:20px; padding:5px 10px; border-top:1px solid #006600; font-size:12px; }
  .bottom-right { position:absolute; bottom:10px; right:10px; font-size:12px; opacity:0.8; animation:flicker 2s infinite; }

 
  @keyframes flicker { 0%,19%,21%,23%,25%,54%,56%,100%{opacity:0.8;} 20%,22%,24%,55%{opacity:0.3;} }
  .glitch { display:inline-block; animation:glitch-text 1s infinite; }
  @keyframes glitch-text { 0%{transform:translate(0,0);}20%{transform:translate(-1px,1px);}40%{transform:translate(1px,-1px);}60%{transform:translate(-1px,0);}80%{transform:translate(1px,1px);}100%{transform:translate(0,0);} }
</style>
</head>
<body>

<header>(sys.log="redacted").exe      STATUS: ACTIVE</header>

<div class="container">
  <nav>
    <a href="console.html">[CONSOLE]</a>
    <a href="logs.html">[LOG]</a>
    <a href="warnings.html">[WARNINGS]</a>
    <a href="hidden.html" id="hidden-files-link">[HIDDEN FILES]</a>
  </nav>

  <main>
    <p class="glitch" data-original="FRAGMENT 3/?? LOADING…">FRAGMENT 3/?? LOADING…</p>
    <p class="glitch" data-original="[ACCESS ATTEMPTED BY UNKNOWN]">[ACCESS ATTEMPTED BY UNKNOWN]</p>
    <p class="glitch" data-original="COPY INITIATED…">COPY INITIATED…</p>
    <p class="glitch" data-original="[FRAGMENT LOST]">[FRAGMENT LOST]</p>
    <p class="glitch" data-original="4721" style="opacity:0.1;">4721</p> 
  </main>

  <aside>
    <p>System ID: 47xJ-82</p>
    <p id="system-time">Time: 03:17:42</p>
    <p>Process: ███</p>
    <p>Alerts: none</p>
  </aside>
</div>

<footer>SYSTEM MESSAGES / ERRORS / TIPS</footer>
<div class="bottom-right">user.id="false?"</div>

<audio autoplay loop>
  <source src="static-whisper.mp3" type="audio/mpeg">
</audio>

<script>
 
  window.addEventListener("load", () => {
    console.log('While exploring this file, please have the source code open. It will help you safely explore the .exe without chance of corrupting your computer.');
    alert('console.log("While exploring this file, please have the source code open. It will help you safely explore the .exe without chance of corrupting your computer.")');
  });


  const hiddenCode = "4721";
  document.getElementById("hidden-files-link").addEventListener("click", function(e){
    e.preventDefault();
    let input = prompt("Enter 4-digit password to access hidden files:");
    if(input === hiddenCode){
      alert("Access Granted! Redirecting...");
      window.location.href = "hiddenfiles.html";
    } else {
      alert("Access Denied. Wrong code.");
    }
  });

 
  function spookyTime() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2,'0');
    const minutes = now.getMinutes().toString().padStart(2,'0');
    const seconds = now.getSeconds().toString().padStart(2,'0');
    return `${hours}:${minutes}:${seconds} 🔺`;
  }
  setInterval(() => {
    document.getElementById('system-time').textContent = `Time: ${spookyTime()}`;
  }, 1000);


  function randomGlitch(text) {
    return text.split('').map(c => Math.random() < 0.1 ? String.fromCharCode(33 + Math.floor(Math.random()*94)) : c).join('');
  }
  setInterval(() => {
    document.querySelectorAll('.glitch').forEach(el => {
      const original = el.getAttribute('data-original');
      el.textContent = randomGlitch(original);
    });
  }, 500);

 
  let titles = ["ERROR: SYSTEM COMPROMISED", "(sys.log='redacted').exe", "ACCESS DENIED"];
  let i = 0;
  setInterval(() => { document.title = titles[i % titles.length]; i++; }, 3000);
</script>

</body>
</html>
